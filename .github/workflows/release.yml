name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-unix:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            artifact: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
            artifact: linux-arm64
          - os: macos-13
            name: macos-x64
            artifact: macos-x64
          - os: macos-14
            name: macos-arm64
            artifact: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc autoconf automake flex bison make tar

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake flex bison

      - name: Bootstrap (autoreconf)
        run: autoreconf -fi

      - name: Configure
        run: ./configure --prefix="$PWD/dist/hazard"

      - name: Build
        run: make -j"$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu)"

      - name: Install staged distribution
        run: make install

      - name: Package archive
        run: |
          archive="hazard-${GITHUB_REF_NAME}-${{ matrix.artifact }}.tar.gz"
          tar -czf "$archive" -C dist hazard

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: hazard-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz
          retention-days: 14

  build-windows:
    name: Build windows-x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            autoconf
            automake
            bison
            flex
            make
            mingw-w64-ucrt-x86_64-gcc

      - name: Bootstrap (autoreconf)
        shell: msys2 {0}
        run: autoreconf -fi

      - name: Configure
        shell: msys2 {0}
        run: ./configure --prefix="$PWD/dist/hazard" CPPFLAGS="-DNDEBUG"

      - name: Build
        shell: msys2 {0}
        run: make -j"$(nproc)"

      - name: Install staged distribution
        shell: msys2 {0}
        run: make install

      - name: Package archive
        shell: pwsh
        run: |
          $archive = "hazard-${env:GITHUB_REF_NAME}-windows-x64.zip"
          Compress-Archive -Path dist/hazard/* -DestinationPath $archive -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: hazard-${{ github.ref_name }}-windows-x64.zip
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-unix
      - build-windows

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          find . -type f \( -name 'hazard-*.tar.gz' -o -name 'hazard-*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/hazard-*.tar.gz
            release-assets/**/hazard-*.zip
            release-assets/SHA256SUMS.txt
