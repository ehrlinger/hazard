name: Windows LL Check (one-shot)

# One-shot investigation workflow for the v4.3/v4.4 numerical reference
# strategy.  Builds a chosen commit on windows-latest using MSYS2/MinGW-w64
# and reports the Log-Likelihood value that hm.deadp.VALVES converges to.
#
# Context: on Linux/gcc/glibc, v4.3.1 and v4.4.2 both produce LL=-1864.76
# (matches reference/v4.3.0/).  On macOS/Apple clang, both produce LL=-1536.4
# (matches reference/v4.4.2/).  The 92 commits in between are numerically
# inert on both platforms; the divergence is 100% cross-platform FP.  This
# workflow collects the third platform data point so the per-platform
# reference corpus layout (v4.4-linux / v4.4-macos / v4.4-windows) can be
# finalised.  See ROOT-CAUSE-ANALYSIS.md §4.
#
# Triggered manually via the "Run workflow" button or `gh workflow run
# windows-ll-check.yml -f ref=<tag>`.  Default ref is v4.4.2 (current
# release tag on release/4.4); override with an older tag to add more
# rows to the cross-platform table.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag, branch, or SHA) to build & run'
        required: true
        default: 'v4.4.2'

jobs:
  ll-check:
    name: LL check at ${{ inputs.ref }} (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            autoconf
            automake
            make
            flex
            bison
            git
            perl

      - name: Show toolchain versions
        run: |
          gcc --version | head -1
          autoconf --version | head -1
          automake --version | head -1
          uname -a

      - name: Patch unportable '\t#' recipe comments before autoreconf
        # Same defensive patch as linux-ll-check.yml: modern automake rejects
        # '\t#' recipe-level comments inside the capture-kit target on some
        # refs.  No-op on refs without the pattern (v4.3.1 et al.).
        run: |
          for f in $(git ls-files 'Makefile.am' '**/Makefile.am'); do
            if grep -qP '^\t#' "$f"; then
              echo "patching $f"
              perl -i -pe 's/^(\t)(#)/$1\@: $2/' "$f"
            fi
          done

      - name: Bootstrap (autoreconf)
        run: autoreconf -fi

      - name: Configure
        # -fcommon restores pre-GCC-10 tentative-definition semantics —
        # needed only for refs older than b142b79 (which rewrote the
        # hazrd4.h declarations as extern).  Harmless on newer refs.
        run: |
          ./configure CC=gcc \
            CFLAGS='-O2 -g -fcommon -w -Wno-error -Wno-incompatible-pointer-types -Wno-int-conversion -Wno-implicit-function-declaration -Wno-implicit-int -Wno-return-type'

      - name: Build
        run: make -j4 -s

      - name: Locate built binary
        id: locate
        run: |
          if [ -x src/hazard/hazard.exe ]; then
            echo "bin=src/hazard/hazard.exe" >> "$GITHUB_OUTPUT"
          elif [ -x src/hazard/hazard ]; then
            echo "bin=src/hazard/hazard" >> "$GITHUB_OUTPUT"
          else
            echo "no binary found in src/hazard/" >&2
            ls -la src/hazard/
            exit 1
          fi

      - name: Stage corpus inputs from release/4.4
        # The build tree is at ${{ inputs.ref }}; inputs + reference data
        # only exist on release/4.4.  A worktree lets us read them without
        # mutating the build tree.
        run: |
          git worktree add /tmp/corpus release/4.4
          ls /tmp/corpus/tests/corpus/hazard/inputs/ | head

      - name: Run hm.deadp.VALVES through the binary
        run: |
          # Short TMPDIR: pre-fix binaries (everything before 60d785f on
          # release/4.4) have the 80-byte path-buffer overflow.  Symlink
          # the .dta / .haz inputs into it so opnfils.c's constructed
          # $TMPDIR/hzr.*.dta resolves.
          #
          # Critical Windows wrinkle: opnfils.c uses UNDERSCORES in the
          # filename on Windows (`hzr_<study>_<dset>.dta`) but DOTS on
          # Linux/macOS (`hzr.<study>.<dset>.dta`) — see opnfils.c
          # `#if defined(__CYGWIN__) || defined(_WIN32)` block.  Our
          # corpus on disk is dot-named (captured on Linux at CCF).
          # Drop BOTH name forms into SHORT_TMP so whichever branch the
          # built binary compiles with finds the file.
          SHORT_TMP=$(mktemp -d /tmp/hz.XXXXXX)
          for f in /tmp/corpus/tests/corpus/hazard/inputs/hzr.*.dta \
                   /tmp/corpus/tests/corpus/hazard/inputs/hzr.*.haz; do
            [ -f "$f" ] || continue
            base=$(basename "$f")                     # e.g. hzr.J970657.X3.dta
            # Dot-named (macOS/Linux binary path)
            ln -sf "$f" "$SHORT_TMP/$base" 2>/dev/null || cp "$f" "$SHORT_TMP/$base"
            # Underscore-named (Windows binary path) —
            # hzr.J970657.X3.dta → hzr_J970657_X3.dta
            ext=${base##*.}                           # dta | haz
            stem=${base%.*}                           # hzr.J970657.X3
            uscored=$(echo "$stem" | tr '.' '_').${ext}
            if [ "$uscored" != "$base" ]; then
              ln -sf "$f" "$SHORT_TMP/$uscored" 2>/dev/null || cp "$f" "$SHORT_TMP/$uscored"
            fi
          done
          echo "=== files in SHORT_TMP ==="
          ls "$SHORT_TMP" | head -20

          BIN="${{ steps.locate.outputs.bin }}"
          echo "Using binary: $BIN"
          TMPDIR="$SHORT_TMP" "./$BIN" \
            < /tmp/corpus/tests/corpus/hazard/inputs/hm.deadp.VALVES.input \
            > /tmp/got.lst 2>&1 || true

          echo "=== output size: $(wc -c < /tmp/got.lst) bytes ==="
          echo "=== head of output ==="
          head -20 /tmp/got.lst
          echo "=== tail of output ==="
          tail -10 /tmp/got.lst

      - name: Extract LL and classify
        run: |
          LL=$(grep -A1 "Log likelihood =" /tmp/got.lst | grep -m1 '^;' | tr -d ' ;')
          echo "Log-likelihood: $LL"

          # Classification buckets:
          #   LINUX    ≈ -1864 / -1865 / -1863  (Linux/gcc/glibc family)
          #   MACOS    ≈ -1536 / -1537 / -1535  (macOS/clang/arm64 family)
          #   NEW      anything else — Windows/MinGW may produce a third
          #            family, which is the interesting signal
          case "$LL" in
            -1864*|-1865*|-1863*)
              echo "::notice::LINUX-family LL ($LL) at ref=${{ inputs.ref }}"
              CLASS="LINUX-family"
              ;;
            -1536*|-1537*|-1535*)
              echo "::notice::MACOS-family LL ($LL) at ref=${{ inputs.ref }}"
              CLASS="MACOS-family"
              ;;
            *)
              echo "::notice::NEW-family LL ($LL) at ref=${{ inputs.ref }} — Windows may be its own platform bucket"
              CLASS="NEW-family (or build issue)"
              ;;
          esac

          echo "## Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Ref**: \`${{ inputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Host**: windows-latest (MSYS2/MinGW-w64, gcc)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **LL (hm.deadp.VALVES)**: \`$LL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Classification**: $CLASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full listing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hm.deadp.VALVES-windows.lst
          path: /tmp/got.lst
          retention-days: 14
          if-no-files-found: warn
